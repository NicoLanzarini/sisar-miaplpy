version: '3.8'

services:
  sisar-execute:
    image: sisar-execute:latest
    container_name: sisar_execute_processor
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ./data/slc:/workspace/slc
      - ./data/dem:/workspace/dem
      - ./data/orbits:/workspace/orbits
      - ./data/isce2_output:/workspace/isce2_output
      - ./data/series_ps:/workspace/series_ps
      - ./data/output:/workspace/output
      - ./config.json:/workspace/config.json
    command: bash /workspace/entrypoint.sh
    stdin_open: true
    tty: true

